appId: com.agrorumo.rumopragas
name: Paywall - feature premium
tags:
  - paywall
  - monetization
---
- launchApp

- runFlow:
    when:
      visible: ".*(Depois|Later|Dismiss).*"
    commands:
      - tapOn:
          text: ".*(Depois|Later|Dismiss).*"

- runFlow:
    when:
      visible: ".*(Skip|Pular|ComeĂ§ar).*"
    commands:
      - tapOn:
          text: ".*(Skip|Pular|ComeĂ§ar).*"

- extendedWaitUntil:
    visible: ".*(Home|CĂąmera|Camera|Diagn).*"
    timeout: 20000

# Tentar acessar histĂłrico ilimitado / biblioteca completa / premium
- runFlow:
    when:
      visible: ".*(HistĂłrico|History|Biblioteca|Library|Premium|Pro|Ilimitado|Unlimited).*"
    commands:
      - tapOn:
          text: ".*(HistĂłrico|History|Biblioteca|Library|Premium|Pro).*"

# Esperar paywall
- extendedWaitUntil:
    visible: ".*(Assinatura|Subscri|Premium|Pro|Upgrade|Desbloq|Unlock|R\\$|USD|\\$).*"
    timeout: 15000
- takeScreenshot: paywall-shown

# Voltar sem comprar
- runFlow:
    when:
      visible: ".*(Depois|Later|Cancel|Voltar|Back|Ă|Close|Fechar).*"
    commands:
      - tapOn:
          text: ".*(Depois|Later|Cancel|Voltar|Back|Ă|Close|Fechar).*"

- takeScreenshot: paywall-dismissed
- assertVisible:
    text: ".*"
